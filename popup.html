<!DOCTYPE html>
<html>
<body style="width: 200px; padding: 15px; font-family: sans-serif; background-color: #f4f4f9;">
  <h3 style="margin-top: 0;">Scroll Timer</h3>
  <label>Interval (<b>seconds</b>):</label>
  <input type="number" id="time" value="30" style="width: 60px; padding: 5px; margin-top: 5px;">
  <button id="startBtn" style="display: block; width: 100%; margin-top: 15px; padding: 8px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Start Scrolling</button>
  <button id="stopBtn" style="display: block; width: 100%; margin-top: 8px; padding: 8px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Stop</button>

  <script src="popup.js"></script>
</body>
</html>
